name: ROMM
slug: romm
version: "1.0.1"
description: Retro ROM Manager
arch:
  - amd64

startup: services
boot: auto
init: false

environment:
  ROMM_AUTH_SECRET_KEY: "replace_with_a_long_random_string"
  ROMM_DATA_DIR: /config
  ROMM_ROMS_DIR: /share/roms

ports:
  8080/tcp: 8080

map:
  - share:rw
  - config:rw

webui: http://[HOST]:[PORT:8080]

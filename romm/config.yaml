name: ROMM
slug: romm
version: "1.0.2"
description: Retro ROM Manager
arch:
  - amd64

startup: services
boot: auto
init: false

environment:
  ROMM_AUTH_SECRET_KEY: "replace_with_long_random_string"
  ROMM_DATA_DIR: /config
  ROMM_ROMS_DIR: /share/roms

  # Database (SQLite – REQUIRED for HA)
  ROMM_DATABASE_ENGINE: sqlite
  ROMM_DATABASE_PATH: /config/romm.db

ports:
  8080/tcp: 8080

map:
  - share:rw
  - config:rw

webui: http://[HOST]:[PORT:8080]
